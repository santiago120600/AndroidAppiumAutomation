name: Run tests
on: [push, workflow_dispatch]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Set up JDK 17 for x64
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          architecture: x64
      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: mvn -B -DskipTests clean install
      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install appium
        run: |
          npm install -g appium@3.2.2
          appium driver install uiautomator2
      - name: Start Appium server in background
        run: |
          appium server --address 0.0.0.0 --port 4723 --relaxed-security > appium.log 2>&1 &
          echo $! > appium.pid
          sleep 10  # Give Appium time to start
          echo "Appium started. Logs:"
          cat appium.log || true
      - name: Set up Docker
        uses: docker/setup-docker-action@v5
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages:
            platform-tools
            emulator
            platforms;android-29
            system-images;android-29;default;x86
      - name: Add Android SDK tools to PATH
        run: |
          echo "$ANDROID_HOME/emulator" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
      - name: Set up android emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          PROFILE: 'pixel_3'
        with:
          api-level: 29
          profile: ${{ env.PROFILE }}
          target: default
          script: |
            docker build -t appium-tests .
            docker run --rm --network host --add-host=host.docker.internal:host-gateway -e PROFILE=${{ env.PROFILE }} -e APP_PATH="$(pwd)/src/test/resources/ApiDemos-debug.apk" -v "$(pwd)/target:/app/target" appium-tests
          emulator-boot-timeout: 300
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: |
            target/cucumber-reports.html
            appium.log