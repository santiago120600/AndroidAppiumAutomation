name: Run tests
on: [push, workflow_dispatch]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Set up JDK 17 for x64
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          architecture: x64
      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: mvn -B -DskipTests clean install
      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install appium
        run: |
          npm install -g appium@3.2.2
          appium driver install uiautomator2
      - name: Verify appium installation
        continue-on-error: true
        run: |
          echo "Appium version:"
          appium --version
          echo "Appium location:"
          which appium
          echo "Global npm root directory:"
          npm root -g
          find $(npm root -g) -name "main.js" -path "*/appium/*"
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages:
            platform-tools
            emulator
            platforms;android-29
            system-images;android-29;default;x86
      - name: Add Android SDK tools to PATH
        run: |
          echo "$ANDROID_HOME/emulator" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
      - name: Set up android emulator
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          profile: pixel_3
          target: default
          script: |
            echo "========================================="
            echo "INSTALLED EMULATORS (AVDs):"
            echo "========================================="
            emulator -list-avds
            
            echo ""
            echo "========================================="
            echo "AVAILABLE SYSTEM IMAGES:"
            echo "========================================="
            sdkmanager --list | grep "system-images" | grep "android-29"
            
            echo ""
            echo "========================================="
            echo "EMULATOR DETAILS:"
            echo "========================================="
            echo "Connected devices:"
            adb devices
            
            echo ""
            echo "Boot status of the emulator:"
            adb shell getprop sys.boot_completed
            
            echo ""
            echo "Emulator name:"
            adb -s emulator-5554 emu avd name
            
            echo ""
            echo "Emulator properties:"
            adb shell getprop | grep emu
            mvn -B test
          emulator-boot-timeout: 300
      - name: Upload test report
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: target/cucumber-reports.html