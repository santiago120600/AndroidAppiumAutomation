name: Run tests
on: [push, workflow_dispatch]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Set up JDK 17 for x64
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          architecture: x64
          cache: maven
      - name: Install dependencies
        run: mvn -B -DskipTests clean install
      - name: Set up node 18 for x64
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install appium
        run: |
          npm install -g appium@3
          appium driver install uiautomator2
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages:
            platform-tools
            emulator
            platforms;android-29
            system-images;android-29;default;x86
      - name: Print Android SDK info
        continue-on-error: true
        run: |
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          echo "JAVA_HOME: $JAVA_HOME"
          echo emulator path: $ANDROID_SDK_ROOT/emulator
          echo tools path: $ANDROID_SDK_ROOT/tools
          echo "Android SDK contents:"
          ls -la $ANDROID_SDK_ROOT
          echo "Platform tools:"
          ls -la $ANDROID_SDK_ROOT/platform-tools
          echo "Emulator:"
          ls -la $ANDROID_SDK_ROOT/emulator
          echo "System images:"
          ls -la $ANDROID_SDK_ROOT/system-images
          echo "Command line tools:"
          ls -la $ANDROID_SDK_ROOT/cmdline-tools
          $ANDROID_SDK_ROOT/emulator/emulator --version
          $ANDROID_SDK_ROOT/emulator/emulator -list-avds
          emulator --version
          emulator -list-avds
          $ANDROID_SDK_ROOT/platform-tools/adb --version
          $ANDROID_SDK_ROOT/platform-tools/adb devices
          adb --version
          adb devices
          which adb
          which emulator
          which java
          echo "AVD home:"
          sdkmanager --list | grep "system-images" || true
      - name: Set up android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          profile: pixel_3
          target: default
          script: mvn -B test
          emulator-boot-timeout: 300
      - name: Upload test report
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: target/cucumber-reports.html